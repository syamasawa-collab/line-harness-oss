name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'apps/liff/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - '.github/workflows/deploy-cloudflare-worker.yml'

# ── 食団連 (shokudanren) 本番設定 ─────────────────────────────
# 秘密ではない値（アカウントID・DB名・Worker名・LIFF/Bot ID）はここに
# 直書きしています。運用者が GitHub に登録するのは唯一の秘密である
# CLOUDFLARE_API_TOKEN（Secrets）だけで済みます。
# D1 の database_id はデプロイ時に DB 名から自動判別するため登録不要です。
env:
  CF_ACCOUNT_ID: aa8389f053c95ca40335702806b333d9
  D1_DATABASE_NAME: line-harness
  WORKER_NAME: line-harness
  VITE_LIFF_ID: 2010757177-wrImutsQ
  VITE_BOT_BASIC_ID: '@974doceg'

jobs:
  deploy:
    # フォーク上（＝ upstream 本家以外）でのみ実行。実際のデプロイには
    # Secrets の CLOUDFLARE_API_TOKEN が必要（未登録なら下の guard で停止）。
    if: github.repository != 'Shudesu/line-harness-oss'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - name: Resolve D1 database id (by name)
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::CLOUDFLARE_API_TOKEN secret is not set"; exit 1; }
          id=$(npx wrangler d1 list --json | node -e '
            const rows = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const want = process.env.D1_DATABASE_NAME;
            const m = rows.find((r) => r.name === want);
            if (!m) { console.error("D1 database not found: " + want); process.exit(1); }
            process.stdout.write(m.uuid || m.database_id || m.id);
          ')
          test -n "$id" || { echo "::error::could not resolve D1 id"; exit 1; }
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "Resolved D1 '$D1_DATABASE_NAME' -> $id"

      - name: Run pending D1 migrations (baseline-safe)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          # マイグレーション追跡テーブルを用意
          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
            "CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT NOT NULL)"

          # このパイプライン以外で構築された本番 DB は _migrations が空。
          # その場合、既存 DB は bootstrap.sql で全スキーマ済みなので、
          # 既存の全マイグレーションを「適用済み」として登録するだけにし、
          # ALTER TABLE ADD COLUMN 等を実行しない（既存列への再実行はエラー）。
          tracked=$(npx wrangler d1 execute "$D1_DATABASE_NAME" --remote \
            --command "SELECT COUNT(*) AS c FROM _migrations" --json \
            | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));process.stdout.write(String(d[0]?.results?.[0]?.c ?? 0))')

          if [ "$tracked" = "0" ]; then
            echo "既存 DB を検出（追跡なし）。スキーマは変更せず、現行マイグレーションを適用済みとして基準化します。"
            for f in $(ls packages/db/migrations/*.sql | sort); do
              name=$(basename "$f")
              npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
                "INSERT OR IGNORE INTO _migrations (name, applied_at) VALUES ('${name}', datetime('now'))"
              echo "Baselined: $name"
            done
          else
            echo "追跡済み DB。未適用のマイグレーションのみ実行します。"
            for f in $(ls packages/db/migrations/*.sql | sort); do
              name=$(basename "$f")
              applied=$(npx wrangler d1 execute "$D1_DATABASE_NAME" --remote \
                --command "SELECT name FROM _migrations WHERE name = '${name}'" --json \
                | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d[0]?.results?.length||0)")
              if [ "$applied" = "0" ]; then
                echo "Applying: $name"
                npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --file="$f"
                npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
                  "INSERT INTO _migrations (name, applied_at) VALUES ('${name}', datetime('now'))"
              else
                echo "Skipped: $name"
              fi
            done
          fi

      - name: Build Worker and LIFF assets
        run: pnpm --filter worker build
        env:
          VITE_LIFF_ID: ${{ env.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ env.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}

      - name: Patch wrangler config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ steps.d1.outputs.id }}
        run: |
          test -n "$D1_DATABASE_ID"
          cd apps/worker
          sed -i \
            -e "s|\"account_id\":\"[^\"]*\"|\"account_id\":\"${CLOUDFLARE_ACCOUNT_ID}\"|g" \
            -e "s|\"database_name\":\"[^\"]*\"|\"database_name\":\"${D1_DATABASE_NAME}\"|g" \
            -e "s|\"database_id\":\"[^\"]*\"|\"database_id\":\"${D1_DATABASE_ID}\"|g" \
            dist/line_harness/wrangler.json

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --config dist/line_harness/wrangler.json --name ${{ env.WORKER_NAME }}
