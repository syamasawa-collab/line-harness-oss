name: Deploy Cloudflare Admin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-cloudflare-admin.yml'

# ── 食団連 (shokudanren) 本番設定 ─────────────────────────────
# 秘密ではない値（アカウントID・Pages プロジェクト名・API URL）はここに
# 直書き。運用者が GitHub に登録する秘密は CLOUDFLARE_API_TOKEN だけ。
env:
  CF_ACCOUNT_ID: aa8389f053c95ca40335702806b333d9
  PAGES_PROJECT_NAME: line-harness-admin-4a5790ae
  NEXT_PUBLIC_API_URL: https://line-harness.shokudanren.workers.dev

jobs:
  deploy:
    if: github.repository != 'Shudesu/line-harness-oss'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-harness/update-engine build

      - name: Capture build metadata
        id: build-meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build Admin Panel
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          APP_BUILD_TIME: ${{ steps.build-meta.outputs.build_time }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::CLOUDFLARE_API_TOKEN secret is not set"; exit 1; }
          npx wrangler pages deploy apps/web/out \
            --project-name="$PAGES_PROJECT_NAME" \
            --commit-message="deploy ${GITHUB_SHA}"
