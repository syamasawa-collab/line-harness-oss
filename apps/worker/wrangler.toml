name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト環境
# ═══════════════════════════════════════════════════════════════
account_id = "32f0604527684aab4d27b5eb4d3d759e"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "8ce39739-ef4f-43e7-8b06-ada4152f1965"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

[vars]
WORKER_NAME = "line-harness"
ADMIN_PAGES_PROJECT = "line-harness-admin"
LIFF_PAGES_PROJECT = "line-harness-liff"
D1_DATABASE_ID = "8ce39739-ef4f-43e7-8b06-ada4152f1965"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://line-harness-oss.n-akiyama.workers.dev"
ADMIN_PUBLIC_URL = "https://line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "32f0604527684aab4d27b5eb4d3d759e"

# ═══════════════════════════════════════════════════════════════
# 本番環境
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "32f0604527684aab4d27b5eb4d3d759e"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "8ce39739-ef4f-43e7-8b06-ada4152f1965"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

[env.production.vars]
WORKER_NAME = "line-harness"
ADMIN_PAGES_PROJECT = "line-harness-admin"
LIFF_PAGES_PROJECT = "line-harness-liff"
D1_DATABASE_ID = "8ce39739-ef4f-43e7-8b06-ada4152f1965"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://line-harness-oss.n-akiyama.workers.dev"
ADMIN_PUBLIC_URL = "https://line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "32f0604527684aab4d27b5eb4d3d759e"
